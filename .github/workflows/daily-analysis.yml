name: Podcast Analysis

on:
  schedule:
    - cron: '30,40,50 1 * * *'         # 北京 9:30, 9:40, 9:50
    - cron: '*/10 2-4 * * *'           # 北京 10:00-12:50 每10分钟
    - cron: '0,10,20,30 5 * * *'       # 北京 13:00, 13:10, 13:20, 13:30
    - cron: '0 9 * * *'                # 北京 17:00 收盘分析
  workflow_dispatch:       # 手动触发

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit and push results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: daily podcast analysis update"
          file_pattern: "data/episodes/*.json docs/**"
