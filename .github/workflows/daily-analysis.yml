name: Podcast Analysis

on:
  schedule:
    # 工作日交易时段每30分钟 + 盘后分析（北京时间 = UTC+8）
    - cron: '30 1,2,3,5,6 * * 1-5'    # 北京 9:30, 10:30, 11:30, 13:30, 14:30
    - cron: '0 2,3,5,6,7,9 * * 1-5'   # 北京 10:00, 11:00, 13:00, 14:00, 15:00, 17:00
  workflow_dispatch:       # 手动触发

permissions:
  contents: write

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: Commit and push results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: daily podcast analysis update"
          file_pattern: "data/episodes/*.json docs/**"
